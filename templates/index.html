<!DOCTYPE html>
<html>
<head>
    <title>SOC Threat Platform</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: monospace;
            padding: 20px;
        }

        h1 {
            color: #58a6ff;
        }

        .card {
            background: #161b22;
            padding: 20px;
            margin: 10px 0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>SOC Threat Detection Platform</h1>

<div class="card">
    <h2>Status</h2>
    <p>System is running...</p>
</div>

<div class="card">
    <h2>📡 Live Logs</h2>

{% for log in logs %}
    <div class="card">{{ log }}</div>
{% endfor %} </div>

<div class="card">
    <h2>Alerts</h2>
    <p>Detection engine coming soon...</p>
</div>

</body>
</html>
